baseURL: https://chesspairing.nl/
title: ChessPairing
enableRobotsTXT: true

languages:
  en:
    languageName: English
    contentDir: content/en
    weight: 1
    params:
      description: >-
        Chess tournament pairing, scoring, and tiebreaking.
        Pure Go library implementing FIDE regulations for Swiss, Round-Robin, Keizer, and more.
    menu:
      main:
        - name: Getting Started
          weight: 10
          url: /docs/getting-started/
          identifier: getting-started
        - name: Concepts
          weight: 20
          url: /docs/concepts/
          identifier: concepts
        - name: Pairing Systems
          weight: 30
          url: /docs/pairing-systems/
          identifier: pairing-systems
        - name: Scoring
          weight: 40
          url: /docs/scoring/
          identifier: scoring
        - name: Tiebreakers
          weight: 50
          url: /docs/tiebreakers/
          identifier: tiebreakers
        - name: CLI Reference
          weight: 60
          url: /docs/cli/
          identifier: cli
        - name: Go API
          weight: 70
          url: /docs/api/
          identifier: api
        - name: GitHub
          weight: 100
          url: https://github.com/zyzniewski/chesspairing
          identifier: github
          params:
            external: true
  nl:
    languageName: Nederlands
    contentDir: content/nl
    weight: 2
    params:
      description: >-
        Indelingen, scores en tiebreakers voor schaaktoernooien.
        Go-bibliotheek conform FIDE-reglementen voor Zwitsers, Round-Robin, Keizer en meer.
    menu:
      main:
        - name: Aan de slag
          weight: 10
          url: /docs/getting-started/
          identifier: getting-started
        - name: Concepten
          weight: 20
          url: /docs/concepts/
          identifier: concepts
        - name: Indelingssystemen
          weight: 30
          url: /docs/pairing-systems/
          identifier: pairing-systems
        - name: Scores
          weight: 40
          url: /docs/scoring/
          identifier: scoring
        - name: Tiebreakers
          weight: 50
          url: /docs/tiebreakers/
          identifier: tiebreakers
        - name: CLI
          weight: 60
          url: /docs/cli/
          identifier: cli
        - name: Go API
          weight: 70
          url: /docs/api/
          identifier: api
        - name: GitHub
          weight: 100
          url: https://github.com/zyzniewski/chesspairing
          identifier: github
          params:
            external: true

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

module:
  hugoVersion:
    extended: true
    min: 0.132.0
  imports:
    - path: github.com/google/docsy
      disable: false

taxonomies: {}

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
            - - $
              - $
        enable: true
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango

params:
  version: v0.1.3
  copyright: Gert Nutterts

  github_repo: https://github.com/zyzniewski/chesspairing
  github_subdir: docs
  github_branch: main

  offlineSearch: true

  ui:
    navbar_logo: true
    sidebar_menu_compact: true
    sidebar_menu_foldable: true
    sidebar_search_disable: false
    breadcrumb_disable: false
    ul_show: 2

  links:
    user:
      - name: GitHub
        url: https://github.com/zyzniewski/chesspairing
        icon: fab fa-github
        desc: Source code on GitHub

  katex:
    enable: true
    version: 0.16.21
